name: Continuous Integration
on: push
jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.17
          cache: false
      - name: Build
        run: make
      - name: Test
        run: make test
